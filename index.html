<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SILENT</title>
<link rel="icon" type="image/png" href="./logo.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* ヘッダー */
.hd{background:#000;border-bottom:1px solid #1a1a1a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hd img{height:52px;cursor:pointer}
.hd-center{flex:1;text-align:center;font-size:15px;color:#ccc;letter-spacing:2px}
.hd-r{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:#cc1111;animation:p 1.5s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.live{font-size:10px;color:#555;letter-spacing:2px}

/* 公開ビュー */
.pub-tab{background:#000;border-bottom:1px solid #1a1a1a;padding:12px 16px}
.pub-tab-inner{font-size:11px;color:#fff;letter-spacing:1px}
.pub-tab-inner small{display:block;font-size:9px;color:#c8a96e;margin-top:2px}
.wrap{padding:12px 12px 60px;max-width:460px;margin:0 auto}

/* コマ */
.hr-block{margin-bottom:20px}
.hr-lbl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#444;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.hr-lbl::after{content:"";flex:1;height:1px;background:#1a1a1a}
.slot{display:flex;align-items:center;margin-bottom:6px;border:1px solid #222;overflow:hidden}
.slot.o{border-color:#1e3a1e;background:#0a150a}
.slot.f{border-color:#3a2800;background:#130e00}
.slot.x{border-color:#2a0000;background:#0d0000;opacity:.55}
.sl-t{padding:12px 10px;border-right:1px solid #1a1a1a;min-width:72px;text-align:center;flex-shrink:0;background:rgba(255,255,255,.02)}
.sl-t .s{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1}
.slot.o .sl-t .s{color:#fff}
.slot.f .sl-t .s{color:#e8a030}
.slot.x .sl-t .s{color:#551111}
.sl-t .e{font-size:8px;color:#444;margin-top:2px}
.sl-t .n{font-size:8px;color:#2a2a2a;margin-top:3px}
.sl-seats{display:flex;gap:5px;padding:10px 12px;flex:1;flex-wrap:wrap;align-items:center}
.seat{width:26px;height:26px;border-radius:3px;flex-shrink:0}
.seat.emp{background:#001a3a;border:1px solid #2288cc}
.seat.tkn{background:#e0e0e0;border:1px solid #aaa}
.sl-r{padding:10px 12px;text-align:right;flex-shrink:0;min-width:50px}
.sl-r .num{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1}
.slot.o .sl-r .num{color:#4aaa4a}
.slot.f .sl-r .num{color:#e8a030}
.slot.x .sl-r .num{color:#441111;font-size:11px;padding-top:4px;letter-spacing:1px}
.sl-r .lbl{font-size:9px;color:#555;margin-top:2px}

/* 非公開画面 */
.no-ev{display:none;flex-direction:column;align-items:center;padding:3rem 1rem;text-align:center;gap:14px}
.no-ev-icon{font-size:40px}
.no-ev-ttl{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:#444}
.sched-box{background:#111;border:1px solid #1a1a1a;padding:1.25rem;width:100%;max-width:360px;text-align:left}
.sched-hd{font-size:10px;color:#555;letter-spacing:2px;margin-bottom:12px;text-align:center}
.sched-ttl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:#c8a96e;margin-bottom:12px;text-align:center}
.sched-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a}
.sched-row:last-of-type{border-bottom:none}
.sched-date{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#888;letter-spacing:1px}
.sched-ev{font-size:10px;color:#555;margin-top:2px}
.sched-time{font-size:10px;color:#555;text-align:right;line-height:1.8}
.price-box{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.price-item{background:#0d0d0d;border:1px solid #1a1a1a;padding:10px;text-align:center}
.price-lbl{font-size:9px;color:#555;letter-spacing:1px;margin-bottom:4px}
.price-num{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#c8a96e}
.price-note{font-size:10px;color:#444;margin-top:10px;text-align:center;letter-spacing:1px}

/* ポップアップ共通 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:160;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.pop-in{background:#111;border:1px solid #2a2a2a;border-bottom:none;padding:20px 20px 32px;width:100%;max-width:460px}
.pop-ttl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:#c8a96e;margin-bottom:16px}
.type-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.tb{padding:18px 12px;border:1px solid #2a2a2a;background:#0d0d0d;cursor:pointer;text-align:center;transition:.15s}
.tb:active{transform:scale(.96)}
.tb.a{border-color:#5a3000}.tb.a:hover{background:#1a0e00;border-color:#8a4000}
.tb.s{border-color:#00305a}.tb.s:hover{background:#00101a;border-color:#004a8a}
.tb .ic{font-size:22px;margin-bottom:6px}
.tb .nm{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
.tb.a .nm{color:#cc7722}.tb.s .nm{color:#2288cc}
.tb .pr{font-size:11px;color:#666;margin-top:3px}
.pop-can{width:100%;background:none;border:1px solid #222;color:#555;font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:12px;cursor:pointer}
.undo-ttl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:#cc1111;margin-bottom:8px}
.undo-inf{font-size:12px;color:#888;margin-bottom:16px;line-height:1.8}
.undo-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.undo-del{background:#8b0000;border:none;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;padding:14px;cursor:pointer}
.undo-del:hover{background:#cc1111}
.undo-can{background:none;border:1px solid #222;color:#555;font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:14px;cursor:pointer}

/* PIN */
.pin-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:200;align-items:center;justify-content:center}
.pin-ov.on{display:flex}
.pin-box{background:#0d0d0d;border:1px solid #2a2a2a;padding:2rem;width:290px;text-align:center;position:relative}
.pin-ttl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:#c8a96e}
.pin-sub{font-size:10px;color:#444;letter-spacing:2px;margin:6px 0 20px}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.pdot{width:12px;height:12px;border:1px solid #333;border-radius:50%;transition:.2s}
.pdot.on{background:#cc1111;border-color:#cc1111}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pk{background:#111;border:1px solid #222;color:#ccc;font-family:'Bebas Neue',sans-serif;font-size:22px;padding:14px;cursor:pointer}
.pk:active{background:#2a0000}
.pin-err{font-size:11px;color:#cc1111;margin-top:12px;min-height:16px}
.pin-x{position:absolute;top:10px;right:12px;background:none;border:none;color:#555;font-size:18px;cursor:pointer}

/* 管理画面 */
.adm{display:none;position:fixed;inset:0;background:#f3f3f3;z-index:150;overflow-y:auto}
.adm.on{display:block}
.adm-hd{background:#fff;border-bottom:1px solid #e0e0e0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.adm-ttl{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:#cc1111}
.adm-cls{background:none;border:1px solid #ddd;color:#666;font-size:11px;padding:6px 14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.adm-body{padding:12px;max-width:600px;margin:0 auto}

/* 公開設定ボックス */
.pub-box{background:#fff;border:1px solid #e8e8e8;padding:16px;margin-bottom:12px}
.pub-box-ttl{font-size:13px;font-weight:500;color:#222;margin-bottom:12px}
.pub-box-status{font-size:11px;margin-bottom:12px;padding:8px 12px;background:#fafafa;border:1px solid #eee}
.pub-day-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pub-day-btn{padding:8px 14px;border:1px solid #ddd;background:#fff;font-size:11px;color:#666;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s}
.pub-day-btn:hover{border-color:#999;color:#333}
.pub-day-btn.on{background:#333;border-color:#333;color:#fff}
.pub-open-btn{width:100%;padding:12px;border:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer;transition:.15s}
.pub-open-btn.open{background:#cc1111;color:#fff}
.pub-open-btn.close{background:#eee;color:#888}

/* 管理コマ */
.adm-sum{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.adm-c{background:#fff;border:1px solid #e8e8e8;padding:14px;text-align:center}
.adm-c .num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#cc1111}
.adm-c .lbl{font-size:10px;color:#999;letter-spacing:1px;margin-top:2px}
.adm-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none}
.adm-tabs::-webkit-scrollbar{display:none}
.adm-tab{flex-shrink:0;padding:7px 14px;font-size:11px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#666;transition:.15s}
.adm-tab.on{background:#cc1111;border-color:#cc1111;color:#fff}
.adm-day-lbl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:#aaa;margin-bottom:10px}
.adm-slot{background:#fff;border:1px solid #eee;margin-bottom:6px;overflow:hidden}
.adm-sh{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f5f5f5;gap:8px}
.adm-sh .t{font-family:'Bebas Neue',sans-serif;font-size:17px;color:#222;letter-spacing:1px}
.adm-sh .e{font-size:10px;color:#bbb}
.adm-sh .b{margin-left:auto;font-size:11px;color:#bbb}
.adm-seats{display:flex;gap:6px;padding:10px 14px;flex-wrap:wrap}
.as{width:52px;height:52px;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;gap:3px;transition:.15s;border:none;font-family:'Noto Sans JP',sans-serif}
.as:active{transform:scale(.92)}
.as.emp{background:#e8f5e9;border:1px solid #81c784;color:#2e7d32}
.as.adu{background:#fff3e0;border:1px solid #ffb74d;color:#e65100}
.as.stu{background:#e3f2fd;border:1px solid #64b5f6;color:#1565c0}
.as .ic{font-size:18px;line-height:1}
.as .lb{font-size:8px;white-space:nowrap}
.adm-rev{padding:7px 14px;background:#fafafa;border-top:1px solid #f0f0f0;font-size:11px;color:#aaa;display:flex;gap:14px}
.adm-rev b{color:#555;font-weight:500}
</style>
</head>
<body>

<!-- 公開ビュー -->
<div id="pub">
  <div class="hd">
    <img id="logo" src="./logo.png" alt="SILENT">
    <div class="hd-center">空きチケット確認ページ</div>
    <div class="hd-r"><div class="dot"></div><div class="live">LIVE</div></div>
  </div>
  <div class="pub-tab" id="pub-tab" style="display:none">
    <div class="pub-tab-inner" id="pub-tab-inner"></div>
  </div>
  <div class="wrap">
    <div id="pub-slots"></div>
    <div class="no-ev" id="no-ev">
      <div class="no-ev-icon">&#x1F47B;</div>
      <div class="no-ev-ttl">&#x672C;&#x65E5;&#x306F;&#x958B;&#x50AC;&#x304C;&#x3042;&#x308A;&#x307E;&#x305B;&#x3093;</div>
      <div class="sched-box" id="sched-box"></div>
    </div>
  </div>
</div>

<!-- 席種別ポップアップ -->
<div class="overlay" id="pop">
  <div class="pop-in">
    <div class="pop-ttl" id="pop-ttl">&#x7A2E;&#x5225;&#x3092;&#x9078;&#x629E;</div>
    <div class="type-btns">
      <div class="tb a" id="btn-a">
        <div class="ic">&#x1F9D1;</div>
        <div class="nm">&#x5927;&#x4EBA;</div>
        <div class="pr">&yen;800</div>
      </div>
      <div class="tb s" id="btn-s">
        <div class="ic">&#x1F392;</div>
        <div class="nm">&#x5C0F;&#x30FB;&#x4E2D;&#x5B66;&#x751F;</div>
        <div class="pr">&yen;600</div>
      </div>
    </div>
    <button class="pop-can" id="pop-can">&#x30AD;&#x30E3;&#x30F3;&#x30BB;&#x30EB;</button>
  </div>
</div>

<!-- 取消ポップアップ -->
<div class="overlay" id="upop">
  <div class="pop-in">
    <div class="undo-ttl">&#x53D6;&#x308A;&#x6D88;&#x3057;</div>
    <div class="undo-inf" id="undo-inf"></div>
    <div class="undo-btns">
      <button class="undo-del" id="undo-del">&#x53D6;&#x308A;&#x6D88;&#x3059;</button>
      <button class="undo-can" id="undo-can">&#x623B;&#x308B;</button>
    </div>
  </div>
</div>

<!-- PIN -->
<div class="pin-ov" id="pin-ov">
  <div class="pin-box">
    <button class="pin-x" id="pin-x">&#x2715;</button>
    <div class="pin-ttl">ADMIN</div>
    <div class="pin-sub">&#x2014; &#x6697;&#x8A3C;&#x756A;&#x53F7;&#x3092;&#x5165;&#x529B; &#x2014;</div>
    <div class="pin-dots">
      <div class="pdot" id="d0"></div><div class="pdot" id="d1"></div>
      <div class="pdot" id="d2"></div><div class="pdot" id="d3"></div>
    </div>
    <div class="pin-grid" id="pin-grid"></div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- 管理画面 -->
<div class="adm" id="adm">
  <div class="adm-hd">
    <div class="adm-ttl">SILENT &#x2014; &#x5F53;&#x65E5;&#x7BA1;&#x7406;</div>
    <button class="adm-cls" id="adm-cls">&#x2715; &#x9589;&#x3058;&#x308B;</button>
  </div>
  <div class="adm-body">

    <!-- 公開設定 + 日付選択 統合 -->
    <div class="pub-box">
      <div class="pub-box-ttl">&#x516C;&#x958B;&#x8A2D;&#x5B9A;</div>
      <div class="pub-box-status" id="pub-status">&#x975E;&#x516C;&#x958B;&#x4E2D;</div>
      <div class="pub-day-btns" id="pub-day-btns"></div>
      <button class="pub-open-btn open" id="pub-open-btn" onclick="toggleOpen()">&#x516C;&#x958B;&#x3059;&#x308B;</button>
    </div>

    <!-- サマリー -->
    <div class="adm-sum">
      <div class="adm-c"><div class="num" id="s-taken">0</div><div class="lbl">&#x5165;&#x5834;&#x6E08;&#x307F;</div></div>
      <div class="adm-c"><div class="num" id="s-remain">0</div><div class="lbl">&#x6B8B;&#x308A;&#x67A0;</div></div>
      <div class="adm-c"><div class="num" id="s-rev">&yen;0</div><div class="lbl">&#x58F2;&#x4E0A;&#x5408;&#x8A08;</div></div>
    </div>

    <div class="adm-day-lbl" id="adm-lbl"></div>
    <div id="adm-slots"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAiFdXEOay4ofm04PGlvsJbjkAJDFZhyLo",
  authDomain: "silent-fd18e.firebaseapp.com",
  databaseURL: "https://silent-fd18e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "silent-fd18e",
  storageBucket: "silent-fd18e.firebasestorage.app",
  messagingSenderId: "150003227854",
  appId: "1:150003227854:web:4507f1a963800bf477449f"
};

var DAYS = [
  {k:"0719", f:"7\u670819\u65e5(\u65e5)", ev:"\u4e09\u30b1\u753a\u796d\u308a"},
  {k:"0801", f:"8\u67081\u65e5(\u571f)",  ev:"\u8e0a\u308a\u4e03\u5915"},
  {k:"0802", f:"8\u67082\u65e5(\u65e5)",  ev:"\u8e0a\u308a\u4e03\u5915"},
  {k:"0808", f:"8\u67088\u65e5(\u571f)",  ev:"\u795e\u8f3f\u30d1\u30ec\u30fc\u30c9"}
];
var SLOTS = [];
(function(){
  var hours=[15,16,17,18,19,20];
  var n=1;
  hours.forEach(function(h){
    for(var m=0;m<50;m+=10){
      var sh=("0"+h).slice(-2),sm=("0"+m).slice(-2);
      var em=m+10,eh=h;
      if(em>=60){em-=60;eh++;}
      SLOTS.push({n:n,s:sh+":"+sm,e:("0"+eh).slice(-2)+":"+("0"+em).slice(-2),h:sh});
      n++;
    }
  });
})();
var MAX=10, PIN="2008";
var pendKey=null, undoKey=null, undoIdx=null;

// Firebase初期化
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// メモリキャッシュ
var _cache = {};
var _open = false;
var _day = DAYS[0].k;

// リアルタイムリスナー：データが変わった瞬間に自動反映される
db.ref("/").on("value", function(snap){
  var val = snap.val() || {};
  // sltデータの配列変換
  if(val.slt){
    Object.keys(val.slt).forEach(function(k){
      if(val.slt[k] && !Array.isArray(val.slt[k])){
        val.slt[k] = Object.values(val.slt[k]);
      }
    });
  }
  _cache = val.slt || {};
  _open = val.config && val.config.open === true;
  if(val.config && val.config.day) _day = val.config.day;

  // 公開ビューは常に最新化
  renderPub();

  // 管理画面が開いている場合はそちらも最新化
  if(document.getElementById("adm").classList.contains("on")){
    renderPubBox();
    renderAdm();
  }
});

function load(){return _cache;}
function save(d){_cache=d;db.ref("slt").set(d);}
function getOpen(){return _open;}
function getDay(){return _day;}
function setDay(k){_day=k;db.ref("config/day").set(k);}
function setOpen(v){_open=v;db.ref("config/open").set(v);}

// ========== 公開ビュー ==========
function renderPub(){
  var isOpen = getOpen();
  var day = getDay();
  var tabEl = document.getElementById("pub-tab");
  var slotsEl = document.getElementById("pub-slots");
  var noEvEl = document.getElementById("no-ev");

  if(isOpen){
    // タブ表示
    var d = DAYS.filter(function(x){return x.k===day})[0];
    tabEl.style.display = "";
    var pti=document.getElementById("pub-tab-inner"); if(pti) pti.innerHTML = (d?d.f:"")+"<small>"+(d?d.ev:"")+"</small>";
    // スロット表示
    slotsEl.style.display = "";
    noEvEl.style.display = "none";
    renderPubSlots(day);
  } else {
    tabEl.style.display = "none";
    slotsEl.style.display = "none";
    noEvEl.style.display = "flex";
    renderSchedBox();
  }
}

function renderPubSlots(day){
  var data = load();
  var el = document.getElementById("pub-slots");
  if(!el) return;
  var html = "", curH = "";
  SLOTS.forEach(function(sl){
    if(sl.h!==curH){
      if(curH) html+="</div>";
      html+="<div class='hr-block'><div class='hr-lbl'>"+sl.h+":00</div>";
      curH=sl.h;
    }
    var k=day+"_"+sl.s;
    var seats=data[k]||[];
    var taken=seats.length, free=MAX-taken;
    var cls=free<=0?"x":free<=1?"f":"o";
    var sh="";
    for(var i=0;i<MAX;i++){
      sh+="<div class='seat "+(i<taken?"tkn":"emp")+"'></div>";
    }
    html+="<div class='slot "+cls+"'>";
    html+="<div class='sl-t'><div class='s'>"+sl.s+"</div><div class='e'>\u301c"+sl.e+"</div><div class='n'>#"+sl.n+"</div></div>";
    html+="<div class='sl-seats'>"+sh+"</div>";
    html+="<div class='sl-r'>";
    if(free<=0) html+="<div class='num'>\u6e80\u54e1</div>";
    else html+="<div class='num'>"+free+"</div><div class='lbl'>\u6b8b\u308a</div>";
    html+="</div></div>";
  });
  if(curH) html+="</div>";
  el.innerHTML=html;
}

    h+="<div class='sched-row'>";

    h+="<div class='sched-time'>15:00 \u301c 21:00<br>\u5168 36 \u30b3\u30de</div>";

  });

  h+="<div class='price-item'><div class='price-lbl'>\u9ad8\u6821\u751f\u30fb\u5927\u4eba</div><div class='price-num'>&yen;800</div></div>";
  h+="</div>";

// ========== 管理画面 公開設定 ==========
function renderPubBox(){
  var isOpen = getOpen();
  var curDay = getDay();

  // ステータス
  var st = document.getElementById("pub-status");
  if(isOpen){
    var d = DAYS.filter(function(x){return x.k===curDay})[0];
    st.style.color="#cc1111";
    st.textContent=(d?d.f+" "+d.ev:"")+" \u516c\u958b\u4e2d";
  } else {
    st.style.color="#999";
    st.textContent="\u975e\u516c\u958b\u4e2d";
  }

  // 日付ボタン
  var el = document.getElementById("pub-day-btns");
  el.innerHTML="";
  DAYS.forEach(function(d){
    var btn = document.createElement("button");
    btn.className="pub-day-btn"+(d.k===curDay?" on":"");
    btn.textContent=d.f;
    btn.onclick=function(){
      setDay(d.k);
      admDay=d.k;
    };
    el.appendChild(btn);
  });

  // 公開ボタン
  var ob = document.getElementById("pub-open-btn");
  if(isOpen){
    ob.textContent="\u975e\u516c\u958b\u306b\u3059\u308b";
    ob.className="pub-open-btn close";
  } else {
    ob.textContent="\u516c\u958b\u3059\u308b";
    ob.className="pub-open-btn open";
  }
}

function toggleOpen(){
  setOpen(!getOpen());
}

// ========== 管理コマ ==========
function buildAdmTabs(){
  var el=document.getElementById("adm-tabs");
  el.innerHTML="";
  DAYS.forEach(function(d){
    var btn=document.createElement("div");
    btn.className="adm-tab"+(d.k===admDay?" on":"");
    btn.textContent=d.f;
    btn.onclick=function(){admDay=d.k;buildAdmTabs();renderAdm();};
    el.appendChild(btn);
  });
}
var admDay=DAYS[0].k;

function renderAdm(){
  var data=load();
  var day=DAYS.filter(function(d){return d.k===admDay})[0];
  document.getElementById("adm-lbl").textContent=day.f+" \u2014 "+day.ev;
  var totT=0,totF=0,totR=0;
  DAYS.forEach(function(d){
    SLOTS.forEach(function(sl){
      var seats=data[d.k+"_"+sl.s]||[];
      totT+=seats.length; totF+=MAX-seats.length;
      seats.forEach(function(s){totR+=s.t==="a"?800:600;});
    });
  });
  document.getElementById("s-taken").textContent=totT;
  document.getElementById("s-remain").textContent=totF;
  document.getElementById("s-rev").textContent="\u00a5"+totR.toLocaleString();
  var el=document.getElementById("adm-slots");
  el.innerHTML="";
  SLOTS.forEach(function(sl){
    var k=admDay+"_"+sl.s;
    var seats=data[k]||[];
    var taken=seats.length,free=MAX-taken;
    var adults=0,students=0;
    var wrap=document.createElement("div"); wrap.className="adm-slot";
    var sh=document.createElement("div"); sh.className="adm-sh";
    sh.innerHTML="<span class='t'>"+sl.s+"</span><span class='e'> \u301c"+sl.e+"</span><span class='b'>#"+sl.n+"&nbsp;&nbsp;"+taken+"/"+MAX+"\u540d</span>";
    wrap.appendChild(sh);
    var sa=document.createElement("div"); sa.className="adm-seats";
    seats.forEach(function(seat,idx){
      var isA=seat.t==="a";
      if(isA)adults++;else students++;
      var btn=document.createElement("button");
      btn.className="as "+(isA?"adu":"stu");
      btn.innerHTML="<span class='ic'>"+(isA?"&#x1F9D1;":"&#x1F392;")+"</span><span class='lb'>"+(isA?"\u5927\u4eba":"\u5c0f\u30fb\u4e2d")+"</span>";
      btn.onclick=(function(key,i,isAdult){return function(){
        undoKey=key; undoIdx=i;
        var lbl=isAdult?"\u5927\u4eba\uff08\u00a5800\uff09":"\u5c0f\u30fb\u4e2d\u5b66\u751f\uff08\u00a5600\uff09";
        document.getElementById("undo-inf").innerHTML="#"+sl.n+" "+sl.s+"\u301c"+sl.e+"<br>"+lbl+"\u3092\u53d6\u308a\u6d88\u3057\u307e\u3059\u304b\uff1f";
        document.getElementById("upop").classList.add("on");
      };})(k,idx,isA);
      sa.appendChild(btn);
    });
    if(free>0){
      var add=document.createElement("button");
      add.className="as emp";
      add.innerHTML="<span class='ic' style='font-size:22px'>+</span><span class='lb'>\u8ffd\u52a0</span>";
      add.onclick=(function(key,slN,slS){return function(){
        pendKey=key;
        document.getElementById("pop-ttl").textContent="#"+slN+" "+slS+" \u2014 \u7a2e\u5225\u3092\u9078\u629e";
        document.getElementById("pop").classList.add("on");
      };})(k,sl.n,sl.s);
      sa.appendChild(add);
    }
    wrap.appendChild(sa);
    if(taken>0){
      var rev=(adults*800)+(students*600);
      var rd=document.createElement("div"); rd.className="adm-rev";
      var txt="";
      if(adults>0)txt+="<b>\u5927\u4eba "+adults+"\u540d</b>";
      if(students>0)txt+="<b>\u5c0f\u30fb\u4e2d "+students+"\u540d</b>";
      txt+="<span style='margin-left:auto'>\u00a5"+rev.toLocaleString()+"</span>";
      rd.innerHTML=txt; wrap.appendChild(rd);
    }
    el.appendChild(wrap);
  });
}

// ========== ポップアップ ==========
document.getElementById("btn-a").onclick=function(){addSeat("a");};
document.getElementById("btn-s").onclick=function(){addSeat("s");};
document.getElementById("pop-can").onclick=function(){document.getElementById("pop").classList.remove("on");pendKey=null;};
function addSeat(type){
  if(!pendKey)return;
  var data=load();
  if(!data[pendKey])data[pendKey]=[];
  if(data[pendKey].length<MAX){data[pendKey].push({t:type,ts:Date.now()});save(data);}
  document.getElementById("pop").classList.remove("on"); pendKey=null;
  renderAdm();
}
document.getElementById("undo-del").onclick=function(){
  if(undoKey===null)return;
  var data=load();
  if(data[undoKey]){data[undoKey].splice(undoIdx,1);if(data[undoKey].length===0)delete data[undoKey];save(data);}
  document.getElementById("upop").classList.remove("on"); undoKey=null; undoIdx=null;
  renderAdm();
};
document.getElementById("undo-can").onclick=function(){document.getElementById("upop").classList.remove("on");undoKey=null;undoIdx=null;};

// ========== PIN ==========
var pinVal="",taps=0,tapTm=null;
document.getElementById("logo").onclick=function(){
  taps++;clearTimeout(tapTm);
  if(taps>=5){taps=0;showPin();return;}
  tapTm=setTimeout(function(){taps=0;},2000);
};
(function(){
  var g=document.getElementById("pin-grid");
  [1,2,3,4,5,6,7,8,9,"DEL",0,""].forEach(function(v){
    if(v===""){g.appendChild(document.createElement("div"));return;}
    var b=document.createElement("button"); b.className="pk"; b.textContent=v;
    if(v==="DEL"){b.style.fontSize="13px";b.style.color="#666";b.onclick=function(){pinVal=pinVal.slice(0,-1);updDots();};}
    else{b.onclick=(function(n){return function(){
      if(pinVal.length>=4)return;
      pinVal+=n;updDots();
      if(pinVal.length===4){setTimeout(function(){
        if(pinVal===PIN){hidePin();showAdm();}
        else{document.getElementById("pin-err").textContent="\u6697\u8a3c\u756a\u53f7\u304c\u9055\u3044\u307e\u3059";pinVal="";updDots();}
      },150);}
    };})(String(v));}
    g.appendChild(b);
  });
})();
function updDots(){for(var i=0;i<4;i++)document.getElementById("d"+i).classList.toggle("on",i<pinVal.length);}
function showPin(){pinVal="";updDots();document.getElementById("pin-err").textContent="";document.getElementById("pin-ov").classList.add("on");}
function hidePin(){document.getElementById("pin-ov").classList.remove("on");}
document.getElementById("pin-x").onclick=hidePin;

// ========== 管理画面 ==========
function showAdm(){admDay=getDay();renderPubBox();renderAdm();document.getElementById("adm").classList.add("on");}
function hideAdm(){document.getElementById("adm").classList.remove("on");renderPub();}
document.getElementById("adm-cls").onclick=hideAdm;

// ========== 初期化 ==========
// Firebase リスナーが自動的に renderPub() / renderAdm() を呼ぶ（リアルタイム反映）
</script>
