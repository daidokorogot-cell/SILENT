<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SILENT</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}

/* ヘッダー */
.hd{background:#000;border-bottom:1px solid #1a1a1a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:8px}
.hd img{height:52px;cursor:pointer}
.hd-center{flex:1;text-align:center}
.hd-tagline{font-size:15px;color:#ccc;letter-spacing:2px}
.hd-r{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:#cc1111;animation:p 1.5s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.live{font-size:10px;color:#555;letter-spacing:2px}

/* 日付タブ */
.tabs{display:flex;overflow-x:auto;background:#000;border-bottom:1px solid #1a1a1a;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;font-size:11px;color:#555;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s}
.tab.on{color:#fff;border-bottom-color:#cc1111}
.tab small{display:block;font-size:9px;color:#c8a96e;margin-top:2px}

/* 公開ビュー */
.wrap{padding:12px 12px 60px;max-width:460px;margin:0 auto}
.upd{display:none}
.legend{display:none}






/* コマ */
.hr-block{margin-bottom:20px}
.hr-lbl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#444;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.hr-lbl::after{content:"";flex:1;height:1px;background:#1a1a1a}
.slot{display:flex;align-items:center;margin-bottom:6px;border:1px solid #222;overflow:hidden}
.slot.o{border-color:#003a6a;background:#000d1a}
.slot.f{border-color:#003a6a;background:#000d1a}
.slot.x{border-color:#2a0000;background:#0d0000;opacity:.55}
.sl-t{padding:12px 10px;border-right:1px solid #1a1a1a;min-width:72px;text-align:center;flex-shrink:0;background:rgba(255,255,255,.02)}
.sl-t .s{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1}
.slot.o .sl-t .s{color:#fff}
.slot.f .sl-t .s{color:#88bbff}
.slot.x .sl-t .s{color:#551111}
.sl-t .e{font-size:8px;color:#444;margin-top:2px}
.sl-t .n{font-size:8px;color:#2a2a2a;margin-top:3px}
.sl-seats{display:flex;gap:5px;padding:10px 12px;flex:1;flex-wrap:wrap;align-items:center}
.seat{width:26px;height:26px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.seat.emp{background:#001a3a;border:1px solid #2288cc}
.seat.adu{background:#e0e0e0;border:1px solid #aaa}
.seat.stu{background:#e0e0e0;border:1px solid #aaa}
.sl-r{padding:10px 12px;text-align:right;flex-shrink:0;min-width:50px}
.sl-r .num{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1}
.slot.o .sl-r .num{color:#4488ff}
.slot.f .sl-r .num{color:#2266cc}
.slot.x .sl-r .num{color:#441111;font-size:11px;padding-top:4px;letter-spacing:1px}
.sl-r .lbl{font-size:9px;color:#555;margin-top:2px}

/* PIN */
.pin-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:200;align-items:center;justify-content:center}
.pin-ov.on{display:flex}
.pin-box{background:#0d0d0d;border:1px solid #2a2a2a;padding:2rem;width:290px;text-align:center;position:relative}
.pin-ttl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:#c8a96e}
.pin-sub{font-size:10px;color:#444;letter-spacing:2px;margin:6px 0 20px}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.pdot{width:12px;height:12px;border:1px solid #333;border-radius:50%;transition:.2s}
.pdot.on{background:#cc1111;border-color:#cc1111}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pk{background:#111;border:1px solid #222;color:#ccc;font-family:'Bebas Neue',sans-serif;font-size:22px;padding:14px;cursor:pointer}
.pk:active{background:#2a0000}
.pin-err{font-size:11px;color:#cc1111;margin-top:12px;min-height:16px}
.pin-x{position:absolute;top:10px;right:12px;background:none;border:none;color:#555;font-size:18px;cursor:pointer}

/* 管理画面 */
.adm{display:none;position:fixed;inset:0;background:#f3f3f3;z-index:150;overflow-y:auto}
.adm.on{display:block}
.adm-hd{background:#fff;border-bottom:1px solid #e0e0e0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.adm-ttl{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:#cc1111}
.adm-cls{background:none;border:1px solid #ddd;color:#666;font-size:11px;padding:6px 14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.adm-body{padding:12px;max-width:600px;margin:0 auto}
.adm-sum{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.adm-c{background:#fff;border:1px solid #e8e8e8;padding:14px;text-align:center}
.adm-c .num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#cc1111}
.adm-c .lbl{font-size:10px;color:#999;letter-spacing:1px;margin-top:2px}
.adm-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none}
.adm-tabs::-webkit-scrollbar{display:none}
.adm-tab{flex-shrink:0;padding:7px 14px;font-size:11px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#666;transition:.15s}
.adm-tab.on{background:#cc1111;border-color:#cc1111;color:#fff}
.adm-day-lbl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:#aaa;margin-bottom:10px}
.adm-slot{background:#fff;border:1px solid #eee;margin-bottom:6px;overflow:hidden}
.adm-sh{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f5f5f5;gap:8px}
.adm-sh .t{font-family:'Bebas Neue',sans-serif;font-size:17px;color:#222;letter-spacing:1px}
.adm-sh .e{font-size:10px;color:#bbb}
.adm-sh .b{margin-left:auto;font-size:11px;color:#bbb}
.adm-seats{display:flex;gap:6px;padding:10px 14px;flex-wrap:wrap}
.as{width:52px;height:52px;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;gap:3px;transition:.15s;border:none;font-family:'Noto Sans JP',sans-serif}
.as:active{transform:scale(.9)}
.as.emp{background:#e8f5e9;border:1px solid #81c784;color:#2e7d32}
.as.adu{background:#fff3e0;border:1px solid #ffb74d;color:#e65100}
.as.stu{background:#e3f2fd;border:1px solid #64b5f6;color:#1565c0}
.as .ic{font-size:18px;line-height:1}
.as 
.adm-rev{padding:7px 14px;background:#fafafa;border-top:1px solid #f0f0f0;font-size:11px;color:#aaa;display:flex;gap:14px}
.adm-rev b{color:#555;font-weight:500}

/* 席種別ポップアップ */
.pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:180;align-items:flex-end;justify-content:center}
.pop.on{display:flex}
.pop-in{background:#111;border:1px solid #2a2a2a;border-bottom:none;padding:20px 20px 32px;width:100%;max-width:460px}
.pop-ttl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:#c8a96e;margin-bottom:16px}
.pop-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.pb{padding:18px 12px;border:1px solid #2a2a2a;background:#0d0d0d;cursor:pointer;text-align:center;transition:.15s}
.pb:active{transform:scale(.96)}
.pb.a{border-color:#5a3000}
.pb.a:hover{background:#1a0e00;border-color:#8a4000}
.pb.s{border-color:#00305a}
.pb.s:hover{background:#00101a;border-color:#004a8a}
.pb .ic{font-size:22px;margin-bottom:6px}
.pb .nm{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
.pb.a .nm{color:#cc7722}
.pb.s .nm{color:#2288cc}
.pb .pr{font-size:11px;color:#666;margin-top:3px}
.pop-can{width:100%;background:none;border:1px solid #222;color:#555;font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:12px;cursor:pointer}

/* 取り消しポップアップ */
.upop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:180;align-items:flex-end;justify-content:center}
.upop.on{display:flex}
.upop-in{background:#111;border:1px solid #2a2a2a;border-bottom:none;padding:20px 20px 32px;width:100%;max-width:460px}
.upop-ttl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:#cc1111;margin-bottom:8px}
.upop-inf{font-size:12px;color:#888;margin-bottom:16px;line-height:1.8}
.upop-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.upop-del{background:#8b0000;border:none;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;padding:14px;cursor:pointer}
.upop-del:hover{background:#cc1111}
.upop-can{background:none;border:1px solid #222;color:#555;font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:14px;cursor:pointer}
</style>
</head>

  h += "<div style=\"margin-top:14px;background:#0d0d0d;border:1px solid #1a1a1a;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px\">";
  h += "<div style=\"text-align:center\"><div style=\"font-size:9px;color:#555;letter-spacing:1px;margin-bottom:4px\">小・中学生</div><div style=\"font-family:'Bebas Neue',sans-serif;font-size:24px;color:#c8a96e\">&yen;600</div></div>";
  h += "<div style=\"text-align:center\"><div style=\"font-size:9px;color:#555;letter-spacing:1px;margin-bottom:4px\">高校生・大人</div><div style=\"font-family:'Bebas Neue',sans-serif;font-size:24px;color:#c8a96e\">&yen;800</div></div>";
  h += "</div>";
  h += "<div style=\"font-size:10px;color:#444;margin-top:10px;letter-spacing:1px;text-align:center\">当日券は 14:00 より販売</div>";
  box.innerHTML = h;
}

function buildPubTabs(){
  var el = document.getElementById("pub-tabs");
  el.innerHTML = "";
  var isOpen = localStorage.getItem("silent_open") === "1";
  var activeDay = localStorage.getItem("silent_active_day") || DAYS[0].k;
  if(isOpen){
    pubDay = activeDay;
    var day = DAYS.filter(function(d){ return d.k === activeDay; })[0];
    if(day){
      var div = document.createElement("div");
      div.className = "tab on";
      div.innerHTML = day.f + "<small>" + day.ev + "</small>";
      el.appendChild(div);
    }
    el.style.display = "";
    document.getElementById("pub-slots").style.display = "";
    document.getElementById("no-event").style.display = "none";
  } else {
    el.style.display = "none";
    document.getElementById("pub-slots").style.display = "none";
    document.getElementById("no-event").style.display = "flex";
    buildNoEventBox();
  }
}

function renderPub(){
  var data = load();
  var el = document.getElementById("pub-slots");
  var html = "";
  var curH = "";
  SLOTS.forEach(function(sl){
    if(sl.h !== curH){
      if(curH) html += "</div>";
      html += "<div class='hr-block'><div class='hr-lbl'>"+sl.h+":00</div>";
      curH = sl.h;
    }
    var k = pubDay+"_"+sl.s;
    var seats = data[k]||[];
    var taken = seats.length, free = MAX-taken;
    var cls = free<=0?"x":free<=1?"f":"o";
    var seatHtml = "";
    for(var i=0;i<MAX;i++){
      if(i<taken){
        var t = seats[i].t;
        seatHtml += "<div class='seat "+(t==="a"?"adu":"stu")+"'></div>";
      } else {
        seatHtml += "<div class='seat emp'></div>";
      }
    }
    html += "<div class='slot "+cls+"'>";
    html += "<div class='sl-t'><div class='s'>"+sl.s+"</div><div class='e'>\u301c"+sl.e+"</div><div class='n'>#"+sl.n+"</div></div>";
    html += "<div class='sl-seats'>"+seatHtml+"</div>";
    html += "<div class='sl-r'>";
    if(free<=0){
      html += "<div class='num'>\u6e80\u54e1</div>";
    } else {
      html += "<div class='num'>"+free+"</div><div class='lbl'>\u6b8b\u308a</div>";
    }
    html += "</div></div>";
  });
  if(curH) html += "</div>";
  el.innerHTML = html;

  var now = new Date();
  document.getElementById("upd").textContent =
    now.getHours()+":"+("0"+now.getMinutes()).slice(-2)+" \u66f4\u65b0";
}

setInterval(function(){ renderPub(); }, 20000);

// ========== PIN ==========
var pinVal = "";
var tapCnt = 0, tapTm = null;

document.getElementById("logo").onclick = function(){
  tapCnt++;
  clearTimeout(tapTm);
  if(tapCnt>=5){ tapCnt=0; showPin(); return; }
  tapTm = setTimeout(function(){ tapCnt=0; }, 2000);
};

(function buildPinGrid(){
  var g = document.getElementById("pin-grid");
  [1,2,3,4,5,6,7,8,9,"DEL",0,""].forEach(function(v){
    if(v===""){
      g.appendChild(document.createElement("div"));
      return;
    }
    var b = document.createElement("button");
    b.className = "pk";
    b.textContent = v;
    if(v==="DEL"){
      b.style.fontSize="13px";
      b.style.color="#666";
      b.onclick = function(){ pinVal=pinVal.slice(0,-1); updDots(); };
    } else {
      b.onclick = (function(n){ return function(){
        if(pinVal.length>=4) return;
        pinVal += n;
        updDots();
        if(pinVal.length===4){
          setTimeout(function(){
            if(pinVal===PIN){ hidePin(); showAdm(); }
            else{
              document.getElementById("pin-err").textContent="\u6697\u8a3c\u756a\u53f7\u304c\u9055\u3044\u307e\u3059";
              pinVal=""; updDots();
            }
          }, 150);
        }
      }; })(String(v));
    }
    g.appendChild(b);
  });
})();

function updDots(){
  for(var i=0;i<4;i++){
    document.getElementById("d"+i).classList.toggle("on", i<pinVal.length);
  }
}
function showPin(){
  pinVal=""; updDots();
  document.getElementById("pin-err").textContent="";
  document.getElementById("pin-ov").classList.add("on");
}
function hidePin(){
  document.getElementById("pin-ov").classList.remove("on");
}
document.getElementById("pin-x").onclick = hidePin;

// ========== 管理画面 ==========
function showAdm(){
  buildAdmTabs();
  renderAdm();
  document.getElementById("adm").classList.add("on");
}
function hideAdm(){
  document.getElementById("adm").classList.remove("on");
  renderPub();
}
document.getElementById("adm-cls").onclick = hideAdm;

function buildAdmTabs(){
  var el = document.getElementById("adm-tabs");
  el.innerHTML = "";
  DAYS.forEach(function(d){
    var div = document.createElement("div");
    div.className = "adm-tab" + (d.k===admDay?" on":"");
    div.textContent = d.f;
    div.onclick = (function(k){ return function(){ admDay=k; buildAdmTabs(); renderAdm(); }; })(d.k);
    el.appendChild(div);
  });
}

function renderAdm(){
  var data = load();
  var day = DAYS.filter(function(d){ return d.k===admDay; })[0];
  document.getElementById("adm-lbl").textContent = day.f + "  " + day.ev;

  // サマリー（全日）
  var totT=0, totF=0, totR=0;
  DAYS.forEach(function(d){
    SLOTS.forEach(function(sl){
      var seats = data[d.k+"_"+sl.s]||[];
      totT += seats.length;
      totF += MAX - seats.length;
      seats.forEach(function(s){ totR += s.t==="a"?800:600; });
    });
  });
  document.getElementById("s-taken").textContent = totT;
  document.getElementById("s-remain").textContent = totF;
  document.getElementById("s-rev").textContent = "\u00a5"+totR.toLocaleString();

  // コマ一覧
  var el = document.getElementById("adm-slots");
  el.innerHTML = "";

  SLOTS.forEach(function(sl){
    var k = admDay+"_"+sl.s;
    var seats = data[k]||[];
    var taken = seats.length, free = MAX-taken;
    var adults=0, students=0;

    var wrap = document.createElement("div");
    wrap.className = "adm-slot";

    // ヘッダー
    var sh = document.createElement("div");
    sh.className = "adm-sh";
    sh.innerHTML =
      "<span class='t'>"+sl.s+"</span>" +
      "<span class='e'> \u301c"+sl.e+"</span>" +
      "<span class='b'>#"+sl.n+"&nbsp;&nbsp;"+taken+"/"+MAX+"\u540d</span>";
    wrap.appendChild(sh);

    // 座席エリア
    var sa = document.createElement("div");
    sa.className = "adm-seats";

    // 既存の座席ボタン
    seats.forEach(function(seat, idx){
      var isA = seat.t==="a";
      if(isA) adults++; else students++;
      var btn = document.createElement("button");
      btn.className = "as " + (isA?"adu":"stu");
      btn.innerHTML =
        "<span class='ic'>"+(isA?"&#x1F9D1;":"&#x1F392;")+"</span>" +
        "<span class='lb'>"+(isA?"\u5927\u4eba":"\u5b66\u751f")+"</span>";
      btn.title = "\u30bf\u30c3\u30d7\u3067\u53d6\u308a\u6d88\u3057";
      // クロージャで idx と k をキャプチャ
      btn.onclick = (function(key, i, s, isAdult){
        return function(){
          undoKey = key;
          undoIdx = i;
          var lbl = isAdult?"\u5927\u4eba\uff08\u00a5800\uff09":"\u5b66\u751f\uff08\u00a5600\uff09";
          document.getElementById("upop-inf").innerHTML =
            "#"+s.n+" "+s.s+"\u301c"+s.e+"<br>"+lbl+"\u3092\u53d6\u308a\u6d88\u3057\u307e\u3059\u304b\uff1f";
          document.getElementById("upop").classList.add("on");
        };
      })(k, idx, sl, isA);
      sa.appendChild(btn);
    });

    // 追加ボタン
    if(free>0){
      var add = document.createElement("button");
      add.className = "as emp";
      add.innerHTML = "<span class='ic' style='font-size:22px'>+</span><span class='lb'>\u8ffd\u52a0</span>";
      add.onclick = (function(key, slotN, slotS){
        return function(){
          pendKey = key;
          pendSlotN = slotN;
          document.getElementById("pop-ttl").textContent =
            "#"+slotN+" "+slotS+" \u2014 \u7a2e\u5225\u3092\u9078\u629e";
          document.getElementById("pop").classList.add("on");
        };
      })(k, sl.n, sl.s);
      sa.appendChild(add);
    }

    wrap.appendChild(sa);

    // 売上行
    if(taken>0){
      var rev = (adults*800)+(students*600);
      var rd = document.createElement("div");
      rd.className = "adm-rev";
      var txt = "";
      if(adults>0) txt += "<b>\u5927\u4eba "+adults+"\u540d</b>";
      if(students>0) txt += "<b>\u5b66\u751f "+students+"\u540d</b>";
      txt += "<span style='margin-left:auto'>\u00a5"+rev.toLocaleString()+"</span>";
      rd.innerHTML = txt;
      wrap.appendChild(rd);
    }

    el.appendChild(wrap);
  });
}

// ========== 席種別ポップアップ ==========
document.getElementById("btn-adult").onclick = function(){ addSeat("a"); };
document.getElementById("btn-student").onclick = function(){ addSeat("s"); };
document.getElementById("pop-can").onclick = function(){
  document.getElementById("pop").classList.remove("on");
  pendKey=null; pendSlotN=null;
};

function addSeat(type){
  if(!pendKey) return;
  var data = load();
  if(!data[pendKey]) data[pendKey] = [];
  if(data[pendKey].length < MAX){
    data[pendKey].push({t:type, ts:Date.now()});
    save(data);
  }
  document.getElementById("pop").classList.remove("on");
  pendKey=null; pendSlotN=null;
  renderAdm();
}

// ========== 取り消しポップアップ ==========
document.getElementById("upop-del").onclick = function(){
  if(undoKey===null) return;
  var data = load();
  if(data[undoKey]){
    data[undoKey].splice(undoIdx,1);
    if(data[undoKey].length===0) delete data[undoKey];
    save(data);
  }
  document.getElementById("upop").classList.remove("on");
  undoKey=null; undoIdx=null;
  renderAdm();
};
document.getElementById("upop-can").onclick = function(){
  document.getElementById("upop").classList.remove("on");
  undoKey=null; undoIdx=null;
};

// ========== 初期化 ==========
buildPubTabs();
renderPub();

function buildDaySelect(){
  var el = document.getElementById("day-btns");
  el.innerHTML = "";
  var active = localStorage.getItem("silent_active_day") || DAYS[0].k;
  DAYS.forEach(function(d){
    var btn = document.createElement("button");
    btn.className = "day-btn" + (d.k===active?" on":"");
    btn.textContent = d.f;
    btn.onclick = (function(k){ return function(){
      localStorage.setItem("silent_active_day", k);
      buildDaySelect();
    }; })(d.k);
    el.appendChild(btn);
  });
}

function togglePublish(){
  var isOpen = localStorage.getItem("silent_open") === "1";
  if(isOpen){
    localStorage.setItem("silent_open","0");
  } else {
    localStorage.setItem("silent_open","1");
  }
  updatePubCtrlUI();
  buildPubTabs();
  renderPub();
}

function updatePubCtrlUI(){
  var isOpen = localStorage.getItem("silent_open") === "1";
  var btn = document.getElementById("pub-toggle-btn");
  var sub = document.getElementById("pub-ctrl-sub");
  if(isOpen){
    var activeDay = localStorage.getItem("silent_active_day") || DAYS[0].k;
    var day = DAYS.filter(function(d){ return d.k===activeDay; })[0];
    btn.textContent = "非公開にする";
    btn.className = "pub-toggle-btn close";
    sub.textContent = (day ? day.f + " " + day.ev : "") + " 公開中";
    sub.style.color = "#cc1111";
  } else {
    btn.textContent = "公開する";
    btn.className = "pub-toggle-btn open";
    sub.textContent = "非公開中";
    sub.style.color = "#999";
  }
}
